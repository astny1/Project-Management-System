{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body_class %}bg-slate-950 overflow-x-hidden{% endblock %}
{% block head %}
<style>
  @keyframes overlayFade {
    0%, 100% { opacity: 0.82; }
    50% { opacity: 0.92; }
  }
  @keyframes softDrift {
    0% { background-position: 50% 50%; }
    50% { background-position: 52% 48%; }
    100% { background-position: 48% 51%; }
  }
  .login-bg-image {
    animation: softDrift 24s ease-in-out infinite alternate;
  }
  .login-bg-fade {
    animation: overlayFade 8s ease-in-out infinite;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }
  .glass-input {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: #f8fafc;
  }
  .glass-input::placeholder { color: rgba(226, 232, 240, 0.45); }
  .glass-input:focus {
    background: rgba(255, 255, 255, 0.11);
    border-color: rgba(45, 212, 191, 0.55);
    box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.18);
  }
</style>
{% endblock %}

{% block content %}
<div class="relative min-h-screen flex items-center justify-center px-4 overflow-hidden">
  <div class="absolute inset-0 overflow-hidden">
    <div
      class="login-bg-image absolute inset-0 bg-cover bg-center bg-no-repeat"
      style="background-image: url('{{ url_for('static', filename='images/login-background.jpg') }}');"
    ></div>
    <div class="login-bg-fade absolute inset-0 bg-gradient-to-br from-slate-950/75 via-hive-950/65 to-slate-900/80"></div>
    <div class="absolute inset-0 bg-slate-900/45 backdrop-blur-[1px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-xs sm:max-w-sm">
    <div class="glass-card rounded-2xl px-6 py-7">
      <div class="text-center mb-5">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-white/10 border border-white/20 p-1.5 mb-3 shadow-lg">
          <img
            src="{{ url_for('static', filename='images/growthhive-logo.jpg') }}"
            alt="GrowthHive Media"
            class="w-full h-full object-contain rounded-lg"
          >
        </div>
        <h1 class="text-lg font-bold text-white tracking-tight">GrowthHive Media</h1>
        <p class="text-slate-400 text-xs mt-0.5">Project Management</p>
      </div>

      <form method="POST" class="space-y-3.5">
        <div>
          <label class="block text-xs font-medium text-slate-300 mb-1">Email</label>
          <input type="email" name="email" required
            class="glass-input w-full px-3 py-2.5 rounded-lg text-sm outline-none transition"
            placeholder="you@company.com">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-300 mb-1">Password</label>
          <input type="password" name="password" required
            class="glass-input w-full px-3 py-2.5 rounded-lg text-sm outline-none transition"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full bg-hive-500/90 hover:bg-hive-400 text-white text-sm font-semibold py-2.5 rounded-lg transition shadow-lg shadow-hive-900/30 border border-hive-300/20 mt-1">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <footer class="absolute bottom-0 left-0 right-0 z-10 pb-4 px-4 text-center">
    <p class="text-[11px] text-slate-400/80 tracking-wide">
      &copy; 2026 GrowthHive Media. All rights reserved. Admin Panel
    </p>
  </footer>
</div>
{% endblock %}
