services:
  - type: web
    name: growthhive-media
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/growthhive.db
